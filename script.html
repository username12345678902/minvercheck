<body>
    <!-- Main content container -->
    <div id="content"></div>

    <script>
        var agent = navigator.userAgent;
        var contentDiv = document.getElementById('content');

        // Check if the user agent is a PS3
        if (agent.indexOf("PLAYSTATION 3") !== -1 || agent.indexOf("PLAYSTATION") !== -1) {
            // Content for PS3 users
            contentDiv.innerHTML = "<h1>halo this is my minvercheck thingy and def is not made w/ai</h1>";
        } else {
            // Content for non-PS3 users
            contentDiv.innerHTML = "<h1>Error</h1><p>Unable to detect device</p>";
        }
    </script>
</body>
</html>
